# PR 検証パイプライン(DesignDoc §11.3)
# lint → typecheck → 教材検証 → unit test → build(+サイズレポート)→ E2E → プレビューデプロイ
name: CI

on:
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    name: lint / typecheck / test / build / e2e
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Enable corepack (pnpm)
        run: corepack enable

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint (Biome)
        run: pnpm lint

      # dev サーバー(E2E)と wrangler が読む開発用変数。secrets は含まないモック値
      - name: Prepare .dev.vars
        run: cp app/.dev.vars.example app/.dev.vars

      # app の typecheck スクリプトが codegen → wrangler types → react-router typegen → tsc を順に実行する
      - name: Typecheck (all packages)
        run: pnpm typecheck

      - name: Validate content (stage 1 - zod parse)
        run: pnpm validate:content

      # e2e パッケージの test は Playwright なので unit テスト段階では除外する
      - name: Unit tests (vitest)
        run: pnpm -r --no-bail --filter '!@codesteps/e2e' run test

      - name: Build
        run: pnpm build

      # Worker バンドルサイズレポート(DesignDoc §10.1: サイズ上限に対する余裕を CI で監視)
      - name: Worker bundle size report
        run: |
          {
            echo "## Worker bundle size"
            echo ""
            echo "| path | size |"
            echo "|---|---|"
            find app/build -type f \( -name '*.js' -o -name '*.mjs' \) -size +50k | sort | while read -r f; do
              echo "| $f | $(du -h "$f" | cut -f1) |"
            done
            echo ""
            echo "- server total: $(du -sh app/build/server | cut -f1)"
            echo "- client total: $(du -sh app/build/client | cut -f1)"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Install Playwright chromium
        run: pnpm --filter @codesteps/e2e exec playwright install --with-deps chromium

      # globalSetup でも適用されるが、失敗を早期に切り分けるため明示的に実行しておく
      - name: Apply local D1 migrations
        run: pnpm --filter @codesteps/app run db:migrate:local

      - name: E2E (Playwright)
        run: pnpm e2e

      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: |
            e2e/playwright-report
            e2e/test-results
          retention-days: 7

  # プレビューデプロイ(§11.2: dev 環境の D1/KV にバインドされた wrangler versions upload)。
  # 必要 secrets: CLOUDFLARE_API_TOKEN(Workers Scripts:Edit)/ CLOUDFLARE_ACCOUNT_ID。
  # 未設定のリポジトリでは skip する(secrets は job-level if で参照できないため step 内で判定)。
  preview:
    name: preview deploy (wrangler versions upload)
    needs: check
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
      pull-requests: write
    steps:
      - name: Check Cloudflare secrets
        id: secrets
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          if [ -z "$CLOUDFLARE_API_TOKEN" ] || [ -z "$CLOUDFLARE_ACCOUNT_ID" ]; then
            echo "available=false" >> "$GITHUB_OUTPUT"
            echo "Cloudflare secrets 未設定のためプレビューデプロイを skip(セットアップ手順: docs/RUNBOOK.md)" >> "$GITHUB_STEP_SUMMARY"
          else
            echo "available=true" >> "$GITHUB_OUTPUT"
          fi

      - uses: actions/checkout@v4
        if: steps.secrets.outputs.available == 'true'

      - name: Enable corepack (pnpm)
        if: steps.secrets.outputs.available == 'true'
        run: corepack enable

      - uses: actions/setup-node@v4
        if: steps.secrets.outputs.available == 'true'
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        if: steps.secrets.outputs.available == 'true'
        run: pnpm install --frozen-lockfile

      - name: Build
        if: steps.secrets.outputs.available == 'true'
        run: pnpm build

      - name: Upload preview version
        if: steps.secrets.outputs.available == 'true'
        id: upload
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          out=$(pnpm --filter @codesteps/app exec wrangler versions upload 2>&1)
          echo "$out"
          url=$(echo "$out" | grep -oE 'https://[A-Za-z0-9.-]+\.workers\.dev' | head -n1 || true)
          echo "url=$url" >> "$GITHUB_OUTPUT"

      - name: Comment preview URL on PR
        if: steps.secrets.outputs.available == 'true' && steps.upload.outputs.url != ''
        env:
          GH_TOKEN: ${{ github.token }}
          PREVIEW_URL: ${{ steps.upload.outputs.url }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          gh pr comment "$PR_NUMBER" --repo "$GITHUB_REPOSITORY" \
            --body "🚀 プレビュー: $PREVIEW_URL (versions upload / dev 環境の D1・KV にバインド)"
