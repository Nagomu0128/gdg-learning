# main デプロイパイプライン(DesignDoc §11.3)
# PR と同じ検証 → D1 マイグレーション適用(prod)→ wrangler deploy → スモークテスト。
# 必要 secrets: CLOUDFLARE_API_TOKEN / CLOUDFLARE_ACCOUNT_ID(未設定でも red にならず「手動セットアップ待ち」で終了)。
# 任意 vars: PROD_URL(スモークテスト先。例 https://codesteps.<subdomain>.workers.dev)。
name: Deploy

on:
  push:
    branches: [main]

concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  verify:
    name: verify (same as CI)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Enable corepack (pnpm)
        run: corepack enable

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint (Biome)
        run: pnpm lint

      - name: Prepare .dev.vars
        run: cp app/.dev.vars.example app/.dev.vars

      - name: Typecheck (all packages)
        run: pnpm typecheck

      - name: Validate content (stage 1 - zod parse)
        run: pnpm validate:content

      - name: Unit tests (vitest)
        run: pnpm -r --no-bail --filter '!@codesteps/e2e' run test

      - name: Build
        run: pnpm build

      - name: Install Playwright chromium
        run: pnpm --filter @codesteps/e2e exec playwright install --with-deps chromium

      - name: Apply local D1 migrations
        run: pnpm --filter @codesteps/app run db:migrate:local

      - name: E2E (Playwright)
        run: pnpm e2e

      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-deploy
          path: |
            e2e/playwright-report
            e2e/test-results
          retention-days: 7

  deploy:
    name: deploy to production
    needs: verify
    runs-on: ubuntu-latest
    timeout-minutes: 20
    environment: production
    steps:
      # secrets は job-level if で参照できないため、先頭 step で存在チェックして無ければ以降を skip する
      - name: Check Cloudflare secrets
        id: secrets
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          if [ -z "$CLOUDFLARE_API_TOKEN" ] || [ -z "$CLOUDFLARE_ACCOUNT_ID" ]; then
            echo "available=false" >> "$GITHUB_OUTPUT"
            echo "Cloudflare secrets 未設定のためデプロイを skip しました(手動セットアップ待ち。手順: docs/RUNBOOK.md)" >> "$GITHUB_STEP_SUMMARY"
          else
            echo "available=true" >> "$GITHUB_OUTPUT"
          fi

      - uses: actions/checkout@v4
        if: steps.secrets.outputs.available == 'true'

      - name: Enable corepack (pnpm)
        if: steps.secrets.outputs.available == 'true'
        run: corepack enable

      - uses: actions/setup-node@v4
        if: steps.secrets.outputs.available == 'true'
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        if: steps.secrets.outputs.available == 'true'
        run: pnpm install --frozen-lockfile

      - name: Build
        if: steps.secrets.outputs.available == 'true'
        run: pnpm build

      # §11.4 expand and contract: 後方互換な拡張を先に適用してからデプロイする
      - name: Apply D1 migrations (production)
        if: steps.secrets.outputs.available == 'true'
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        # wrangler.jsonc に env.production(prod の D1/KV id)を定義しておくこと(docs/RUNBOOK.md)
        run: pnpm --filter @codesteps/app exec wrangler d1 migrations apply DB --env production --remote

      - name: Deploy Worker
        if: steps.secrets.outputs.available == 'true'
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: pnpm --filter @codesteps/app exec wrangler deploy --env production

      - name: Smoke test
        if: steps.secrets.outputs.available == 'true'
        env:
          PROD_URL: ${{ vars.PROD_URL }}
        run: |
          if [ -z "$PROD_URL" ]; then
            echo "vars.PROD_URL 未設定のためスモークテストを skip(docs/RUNBOOK.md 参照)" >> "$GITHUB_STEP_SUMMARY"
            exit 0
          fi
          # デプロイ直後の伝播を考慮してリトライ付きで / が 200 を返すことを確認
          for i in 1 2 3 4 5; do
            if curl -fsS -o /dev/null "$PROD_URL/"; then
              echo "smoke test OK: $PROD_URL/"
              exit 0
            fi
            echo "retry $i..."
            sleep 10
          done
          echo "smoke test FAILED: $PROD_URL/"
          exit 1
